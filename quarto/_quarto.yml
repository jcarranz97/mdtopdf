project:
  type: book
  output-dir: _build

# Conditional content filter — reads DOC_TYPE env var exported by the Makefile.
# Strips fenced divs whose type classes don't match (e.g. ::: {.type2}).
filters:
  - ../filters/doc-type.lua

book:
  title: "Platform API — Technical Guide"
  author:
    - "Alice Nguyen"
    - "Bob Martínez"
    - "Carol Smith"
  date: "2026-04-14"
  chapters:
    - index.md
    - _src/01-introduction.md
    - _src/02-architecture.md
    - _src/03-api-reference.md
    - _src/04-deployment.md
    - _src/05-code-examples.md
    - _src/06-variants.md

# ─── PDF output (via LaTeX) ────────────────────────────────────────────────────
format:
  pdf:
    documentclass: scrreprt       # KOMA-Script report — cleaner than default
    classoption: [oneside]
    papersize: a4
    fontsize: 11pt
    geometry:
      - margin=2.5cm
    mainfont: "DejaVu Serif"
    sansfont: "DejaVu Sans"
    monofont: "DejaVu Sans Mono"
    colorlinks: true
    linkcolor: "336699"
    urlcolor: "336699"
    number-sections: true
    toc: true
    toc-depth: 3
    highlight-style: tango
    # Generated by the Makefile from DOC_ID / DOC_MAJOR / DOC_MINOR / DOC_DATE.
    # Run: make pdf DOC_ID=5678 DOC_MAJOR=2 DOC_MINOR=01
    include-in-header: _header.tex

# ─── HTML output ───────────────────────────────────────────────────────────────
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    highlight-style: tango
    code-copy: true
