name: Generate PDFs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ── Pandoc + Eisvogel ────────────────────────────────────────────────────────
  pandoc-pdf:
    name: Pandoc PDF
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/mdtopdf-pandoc:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        working-directory: pandoc
        run: make

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: pandoc-pdf
          path: pandoc/output/*.pdf

  # ── Quarto ───────────────────────────────────────────────────────────────────
  quarto-pdf:
    name: Quarto PDF
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/mdtopdf-quarto:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        working-directory: quarto
        env:
          QUARTO_LATEX_AUTO_INSTALL: "false"
        run: make pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: quarto-pdf
          path: quarto/_build/**/*.pdf

  # ── Sphinx + MyST ─────────────────────────────────────────────────────────────
  sphinx-pdf:
    name: Sphinx PDF
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/mdtopdf-sphinx:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        working-directory: sphinx
        run: make pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: sphinx-pdf
          path: sphinx/_build/latex/*.pdf
