name: Build Docker images

on:
  push:
    branches: [main]
    paths:
      - pandoc/Dockerfile
      - quarto/Dockerfile
      - sphinx/Dockerfile
  pull_request:
    paths:
      - pandoc/Dockerfile
      - quarto/Dockerfile
      - sphinx/Dockerfile
  workflow_dispatch:

jobs:
  # ── Pandoc + Eisvogel ────────────────────────────────────────────────────────
  pandoc:
    name: Build Pandoc image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: pandoc
          file: pandoc/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/mdtopdf-pandoc:latest

  # ── Quarto ───────────────────────────────────────────────────────────────────
  quarto:
    name: Build Quarto image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: quarto
          file: quarto/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/mdtopdf-quarto:latest

  # ── Sphinx + MyST ─────────────────────────────────────────────────────────────
  sphinx:
    name: Build Sphinx image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: sphinx
          file: sphinx/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/mdtopdf-sphinx:latest
