name: Test Docker images (standalone)

# Runs after the build workflow pushes new images to GHCR, or on demand.
# Each job creates only .md files, then uses the Docker image to produce a PDF.
# No files from this repository are mounted — only the markdown input.
# A non-empty PDF in the output directory is the pass condition.

on:
  workflow_run:
    workflows: ["Build Docker images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Pandoc + Eisvogel ────────────────────────────────────────────────────────
  test-pandoc:
    name: Test Pandoc (standalone PDF)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Create test markdown file
        run: |
          mkdir -p /tmp/pandoc-test
          cat > /tmp/pandoc-test/doc.md << 'MD'
          # Introduction

          Standalone test — only this `.md` file is provided.
          The image supplies everything else: pandoc, LaTeX, Eisvogel, and
          the default `metadata.yaml`.

          ## Section One

          Some content to exercise the full PDF pipeline.

          ## Section Two

          More content to verify multi-section rendering.
          MD

      - name: Generate PDF using /defaults/metadata.yaml from the image
        run: |
          docker run --rm \
            -v /tmp/pandoc-test:/docs \
            ghcr.io/jcarranz97/mdtopdf-pandoc:latest \
            pandoc /defaults/metadata.yaml /docs/doc.md \
              --template eisvogel \
              --pdf-engine xelatex \
              --from markdown+smart \
              --toc --number-sections \
              -o /docs/output.pdf

      - name: Verify PDF is non-empty
        run: |
          test -s /tmp/pandoc-test/output.pdf
          echo "Pandoc PDF size: $(wc -c < /tmp/pandoc-test/output.pdf) bytes"

  # ── Quarto ───────────────────────────────────────────────────────────────────
  test-quarto:
    name: Test Quarto (standalone PDF)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Create minimal Quarto project (no repo files)
        run: |
          mkdir -p /tmp/quarto-test
          cat > /tmp/quarto-test/_quarto.yml << 'YAML'
          project:
            type: book
          book:
            title: "Standalone Test"
            author: "CI"
            chapters:
              - index.md
          format:
            pdf:
              documentclass: scrreprt
              pdf-engine: xelatex
              mainfont: "DejaVu Serif"
              sansfont: "DejaVu Sans"
              monofont: "DejaVu Sans Mono"
          YAML
          cat > /tmp/quarto-test/index.md << 'MD'
          # Preface

          Standalone test — only `.md` files and a minimal `_quarto.yml` are
          provided. The image supplies Quarto, LaTeX, and all fonts.

          ## Section One

          Some content to exercise the full PDF pipeline.

          ## Section Two

          More content to verify multi-section rendering.
          MD

      - name: Generate PDF
        run: |
          docker run --rm \
            -v /tmp/quarto-test:/project \
            -w /project \
            -e QUARTO_LATEX_AUTO_INSTALL=false \
            ghcr.io/jcarranz97/mdtopdf-quarto:latest \
            quarto render --to pdf

      - name: Verify PDF is non-empty
        run: |
          pdf=$(find /tmp/quarto-test -name "*.pdf" | head -1)
          test -n "$pdf"
          test -s "$pdf"
          echo "Quarto PDF: $pdf ($(wc -c < "$pdf") bytes)"

  # ── Sphinx + MyST ─────────────────────────────────────────────────────────────
  test-sphinx:
    name: Test Sphinx (standalone PDF)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Create minimal Sphinx project (no repo files)
        run: |
          mkdir -p /tmp/sphinx-test
          cat > /tmp/sphinx-test/conf.py << 'PY'
          project = "Standalone Test"
          author = "CI"
          extensions = ["myst_parser"]
          latex_engine = "xelatex"
          latex_elements = {
              "papersize": "a4paper",
              "pointsize": "11pt",
              "fontpkg": r"""
          \usepackage{fontspec}
          \setmainfont{DejaVu Serif}
          \setsansfont{DejaVu Sans}
          \setmonofont{DejaVu Sans Mono}[Scale=0.9]
          """,
          }
          latex_documents = [
              ("index", "test.tex", "Standalone Test", "CI", "manual"),
          ]
          PY
          cat > /tmp/sphinx-test/index.md << 'MD'
          # Standalone Test

          ```{toctree}
          :maxdepth: 2
          content
          ```
          MD
          cat > /tmp/sphinx-test/content.md << 'MD'
          # Chapter One

          Standalone test — only `.md` files and a minimal `conf.py` are
          provided. The image supplies Sphinx, MyST-Parser, LaTeX, and all fonts.

          ## Section

          Some content to exercise the full PDF pipeline.
          MD

      - name: Generate PDF
        run: |
          docker run --rm \
            -v /tmp/sphinx-test:/project \
            ghcr.io/jcarranz97/mdtopdf-sphinx:latest \
            bash -c "
              sphinx-build -b latex /project /project/_build/latex -q &&
              make -C /project/_build/latex all-pdf LATEXMKOPTS='-silent'
            "

      - name: Verify PDF is non-empty
        run: |
          pdf=$(find /tmp/sphinx-test -name "*.pdf" | head -1)
          test -n "$pdf"
          test -s "$pdf"
          echo "Sphinx PDF: $pdf ($(wc -c < "$pdf") bytes)"
