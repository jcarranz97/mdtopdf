name: Test Docker images (standalone)

# Runs after the build workflow pushes new images to GHCR, or on demand.
# Each job mounts the repo and runs the same make command a user would run,
# then checks that a non-empty PDF was produced.

on:
  workflow_run:
    workflows: ["Build Docker images"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Pandoc + Eisvogel ────────────────────────────────────────────────────────
  test-pandoc:
    name: Test Pandoc (standalone PDF)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Create test markdown file
        run: |
          mkdir -p /tmp/pandoc-test
          cat > /tmp/pandoc-test/doc.md << 'MD'
          # Introduction

          Standalone test — only this `.md` file is provided.
          The image supplies everything else: pandoc, LaTeX, Eisvogel, and
          the default `metadata.yaml`.

          ## Section One

          Some content to exercise the full PDF pipeline.

          ## Section Two

          More content to verify multi-section rendering.
          MD

      - name: Generate PDF via make
        run: |
          docker run --rm \
            -v /tmp/pandoc-test:/docs \
            ghcr.io/jcarranz97/mdtopdf-pandoc:latest \
            DOCS_DIR=/docs \
            DOC_ID=TEST \
            DOC_MAJOR=1 \
            DOC_MINOR=0

      - name: Verify PDF is non-empty
        run: |
          test -s /tmp/pandoc-test/output.pdf
          echo "Pandoc PDF size: $(wc -c < /tmp/pandoc-test/output.pdf) bytes"

  # ── Quarto ───────────────────────────────────────────────────────────────────
  test-quarto:
    name: Test Quarto (standalone PDF)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Generate PDF via make pdf
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/quarto \
            -e QUARTO_LATEX_AUTO_INSTALL=false \
            ghcr.io/jcarranz97/mdtopdf-quarto:latest \
            make pdf

      - name: Verify PDF is non-empty
        run: |
          pdf=$(find ${{ github.workspace }}/quarto/_build -name "*.pdf" | head -1)
          test -n "$pdf"
          test -s "$pdf"
          echo "Quarto PDF: $pdf ($(wc -c < "$pdf") bytes)"

  # ── Sphinx + MyST ─────────────────────────────────────────────────────────────
  test-sphinx:
    name: Test Sphinx (standalone PDF)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Generate PDF via make pdf
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/sphinx \
            ghcr.io/jcarranz97/mdtopdf-sphinx:latest \
            make pdf

      - name: Verify PDF is non-empty
        run: |
          pdf=$(find ${{ github.workspace }}/sphinx/_build/latex -name "*.pdf" | head -1)
          test -n "$pdf"
          test -s "$pdf"
          echo "Sphinx PDF: $pdf ($(wc -c < "$pdf") bytes)"
